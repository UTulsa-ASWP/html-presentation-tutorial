st into <span style=\"color:#d4a017;\">review<\u002Fspan> when it’s ready · let the team approve before it merges to <span style=\"color:#d4a017;\">main<\u002Fspan>. Everything else is detail you can look up.<\u002Fp>\n      <div style=\"font-family:'SF Mono',Menlo,monospace; font-size:0.74rem; color:rgba(250,250,247,0.5); border-top:1px solid rgba(255,255,255,0.1); padding-top:18px;\">ASWP Summer 2026 · AIPP course development · built for a hosted website<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  \n\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1000, &quot;height&quot;: 800}}\">\nclass Component extends DCLogic {\n  state = {\n    scrollPct: 0,\n    treeExpanded: { macro: true, units: true },\n    treeSel: 'macro',\n    step: 0,\n    gitVerb: 'commit',\n    assistIntent: 0,\n    tool: 'desktop',\n    term: { lines: [{ kind: 'sys', text: '# Try the real flow. Type a command and press Enter — or tap “fill in” if you’re unsure.' }], step: 0, input: '', done: false },\n    pr: { active: 0, tab: 0, approved: [false, false], merged: [false, false] },\n    conflictResolved: false\n  };\n\n  termScenario = [\n    { keywords: ['git', 'clone'], command: 'git clone https://github.com/UTulsa-ASWP/summer-2026-AIPP-course-development.git', output: ['Cloning into \\'summer-2026-AIPP-course-development\\'...', 'remote: Enumerating objects: 1284, done.', 'Receiving objects: 100% (1284/1284), done.', '✓ The whole repo is now on your machine.'], hint: 'Start by cloning the repo: git clone <url>' },\n    { keywords: ['cd'], command: 'cd summer-2026-AIPP-course-development', output: ['(you’re now inside the repo folder)'], hint: 'Move into the repo: cd summer-2026-AIPP-course-development' },\n    { keywords: ['switch', 'dev/unit-03'], command: 'git switch -c dev/unit-03-ethics', output: ['Switched to a new branch \\'dev/unit-03-ethics\\'', 'This is your sandbox — main stays safe.'], hint: 'Create your branch: git switch -c dev/unit-03-ethics' },\n    { keywords: ['add'], command: 'git add .', output: ['(changes staged — no output is normal here)'], hint: 'Stage your work: git add .' },\n    { keywords: ['commit'], command: 'git commit -m \"Draft Unit 03 ethics slides\"', output: ['[dev/unit-03-ethics 9f2a1c0] Draft Unit 03 ethics slides', ' 3 files changed, 294 insertions(+)'], hint: 'Commit with a message: git commit -m \"…\"' },\n    { keywords: ['push'], command: 'git push -u origin dev/unit-03-ethics', output: ['To github.com:UTulsa-ASWP/summer-2026-AIPP-course-development.git', ' * [new branch]      dev/unit-03-ethics -> dev/unit-03-ethics', '✓ Pushed! GitHub now offers: “Compare & pull request”.'], hint: 'Publish your branch: git push -u origin dev/unit-03-ethics' }\n  ];\n\n  runTerm = (override) => {\n    const sc = this.termScenario;\n    const t = this.state.term;\n    if (t.done) return;\n    const raw = (override != null ? override : t.input).trim();\n    if (!raw) return;\n    const norm = raw.replace(/\\s+/g, ' ').toLowerCase();\n    const exp = sc[t.step];\n    const ok = exp.keywords.every(k => norm.includes(k));\n    const lines = [...t.lines, { kind: 'cmd', text: '$ ' + raw }];\n    let nextStep = t.step, done = false;\n    if (ok) {\n      exp.output.forEach(o => lines.push({ kind: 'out', text: o }));\n      nextStep = t.step + 1;\n      if (nextStep >= sc.length) { done = true; lines.push({ kind: 'sys', text: 'Nice — your branch is on GitHub. Next: open a Pull Request ↓' }); }\n    } else {\n      lines.push({ kind: 'err', text: 'Not the next step yet — ' + exp.hint });\n    }\n    this.setState({ term: { lines, step: nextStep, input: '', done } });\n  };\n  onTermInput = (e) => { const v = e.target.value; this.setState(s => ({ term: { ...s.term, input: v } })); };\n  onTermKey = (e) => { if (e.key === 'Enter') this.runTerm(); };\n  fillTerm = () => { const exp = this.termScenario[this.state.term.step]; if (exp) this.setState(s => ({ term: { ...s.term, input: exp.command } })); };\n  resetTerm = () => this.setState({ term: { lines: [{ kind: 'sys', text: '# Try the real flow. Type a command and press Enter — or tap “fill in” if you’re unsure.' }], step: 0, input: '', done: false } });\n\n  setPrActive = (i) => this.setState(s => ({ pr: { ...s.pr, active: i, tab: 0 } }));\n  setPrTab = (i) => this.setState(s => ({ pr: { ...s.pr, tab: i } }));\n  approvePr = () => this.setState(s => { const a = [...s.pr.approved]; a[s.pr.active] = true; return { pr: { ...s.pr, approved: a } }; });\n  mergePr = () => this.setState(s => { if (!s.pr.approved[s.pr.active]) return {}; const m = [...s.pr.merged]; m[s.pr.active] = true; return { pr: { ...s.pr, merged: m } }; });\n  toggleConflict = () => this.setState(s => ({ conflictResolved: !s.conflictResolved }));\n  setTool = (t) => this.setState({ tool: t });\n\n  componentDidMount() {\n    this._onScroll = () => {\n      const h = document.documentElement;\n      const max = (h.scrollHeight - h.clientHeight) || 1;\n      this.setState({ scrollPct: Math.min(100, Math.max(0, (h.scrollTop / max) * 100)) });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n  componentWillUnmount() { window.removeEventListener('scroll', this._onScroll); }\n\n  nextStep = () => this.setState(s => ({ step: Math.min(5, s.step + 1) }));\n  prevStep = () => this.setState(s => ({ step: Math.max(0, s.step - 1) }));\n  resetStep = () => this.setState({ step: 0 });\n\n  renderVals() {\n    const navy = '#1d3557', navyDeep = '#0f1e33', navyLight = '#2c5282', steel = '#7da7d9';\n    const gold = '#b8860b', goldLight = '#d4a017', green = '#2a7f62', ink = '#1a1a2e';\n\n    /* ---- chrome ---- */\n    const progressStyle = 'position:fixed; top:0; left:0; height:4px; width:' + this.state.scrollPct + '%; background:#b8860b; z-index:1000; transition:width .1s linear;';\n    const navLinks = [\n      { href: '#why', label: 'Why Git' },\n      { href: '#mechanics', label: 'Moves' },\n      { href: '#setup', label: 'Setup' },\n      { href: '#loop', label: 'Daily loop' },\n      { href: '#repo', label: 'Repo' },\n      { href: '#pipeline', label: 'Branching' },\n      { href: '#reviews', label: 'Review' },\n      { href: '#issues', label: 'Issues' },\n      { href: '#assist', label: 'With AI' },\n      { href: '#context', label: 'Grounding' },\n      { href: '#gotchas', label: 'Habits' },\n      { href: '#capstone', label: 'Capstone' },\n      { href: '#reference', label: 'Reference' }\n    ];\n    const whyCards = [\n      { title: 'Consistency', body: 'Dozens of hands and AI sessions produce work that still looks and reads like one course.' },\n      { title: 'Safety', body: 'The live course on main never breaks — drafts stay quarantined on branches until accepted.' },\n      { title: 'A paper trail', body: 'Every change is reviewed, discussed, and recorded. You can always see who changed what, and why.' }\n    ];\n\n    /* ---- repo tree ---- */\n    const T = [\n      { id: 'claude', p: null, t: 'file', label: 'CLAUDE.md', path: 'CLAUDE.md', title: 'CLAUDE.md', tag: 'MACRO', desc: 'An efficient slice of macro context auto-loaded into every AI session, so independent sessions pull in the same direction.' },\n      { id: 'readme', p: null, t: 'file', label: 'README.md', path: 'README.md', title: 'README.md', desc: 'The start-here orientation: how to get set up, the workflow, and links to everything else.' },\n      { id: 'onboarding', p: null, t: 'dir', label: 'onboarding/', path: 'onboarding/', title: 'onboarding/', desc: 'Where a new teammate begins: orientation, a first-session walkthrough, and the project vision deck.' },\n      { id: 'onb-readme', p: 'onboarding', t: 'file', label: 'README.md', path: 'onboarding/README.md', title: 'onboarding/README.md', desc: 'The map to the foundation docs, the tutorial decks, the tools, and a first-session walkthrough.' },\n      { id: 'onb-vision', p: 'onboarding', t: 'dir', label: 'vibe-engineering-aswp-2026/', path: 'onboarding/vibe-engineering-aswp-2026/', title: 'The vision deck', desc: 'The “why” of the whole project, as an HTML + PDF deck. Watch this early.' },\n      { id: 'macro', p: null, t: 'dir', label: 'course-macro-context/', path: 'course-macro-context/', title: 'course-macro-context/', tag: 'MACRO', desc: 'The shared foundation — read once, load the relevant ones every time you build. This is the macro context that grounds every session.' },\n      { id: 'm1', p: 'macro', t: 'file', label: 'mission-vision-scope.md', path: 'course-macro-context/mission-vision-scope.md', title: 'mission-vision-scope.md', desc: 'What we’re making and why — the north star for every decision.' },\n      { id: 'm2', p: 'macro', t: 'file', label: 'users-and-deliverables.md', path: 'course-macro-context/users-and-deliverables.md', title: 'users-and-deliverables.md', desc: 'Who we serve (teachers & students) and the deliverable types we produce.' },\n      { id: 'm3', p: 'macro', t: 'file', label: 'pedagogy.md', path: 'course-macro-context/pedagogy.md', title: 'pedagogy.md', desc: 'The Academic Standards — the educational requirements our content must meet.' },\n      { id: 'm4', p: 'macro', t: 'file', label: 'processes.md', path: 'course-macro-context/processes.md', title: 'processes.md', desc: 'How we build — the production pipeline and the macro/meso/micro context model. (This tutorial is built from it.)' },\n      { id: 'm5', p: 'macro', t: 'file', label: 'syllabus.md', path: 'course-macro-context/syllabus.md', title: 'syllabus.md', desc: 'The whole-course outline that informs every unit and lesson.' },\n      { id: 'm6', p: 'macro', t: 'file', label: 'references.md', path: 'course-macro-context/references.md', title: 'references.md', desc: 'Shared source material and citations the course draws on.' },\n      { id: 'm7', p: 'macro', t: 'file', label: 'timeline.md', path: 'course-macro-context/timeline.md', title: 'timeline.md'
